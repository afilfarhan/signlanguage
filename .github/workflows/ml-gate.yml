name: CI (ML release gates + Frontend checks)

on:
  push:
    paths:
      - 'ml/**'
      - 'prototype/**'
      - 'ci/**'
      - 'signtutor/**'
      - '.github/workflows/ml-gate.yml'
  pull_request: {}
  workflow_dispatch: {}

jobs:
  # --------------------------------------------------------------------------
  # ML jobs – must keep running and passing on every push that touches ML code.
  # --------------------------------------------------------------------------
  ml-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          python3 -m pip install --quiet \
            numpy scikit-learn skl2onnx onnx \
            onnxruntime onnxscript
          python3 -m pip install --quiet \
            torch --index-url https://download.pytorch.org/whl/cpu

      # --- Static MLP -----------------------------------------------------
      - name: Train static MLP & write eval report
        run: python3 ml/train_export.py

      # --- Dynamic Transformer (with rotation augmentation) --------------
      # The --rotation-aug flag is what closes the NFR-10 gate; see
      # ml/ROBUSTNESS_GATE_DEMO.md for the full diagnosis.
      - name: Train dynamic Transformer & write eval report
        run: python3 ml/train_transformer.py --rotation-aug

      - name: Robustness sweep on dynamic model
        run: python3 ml/eval_robustness.py

      # --- Sync prototype/models/ from ml/models/ -------------------------
      - name: Copy models into served bundle
        run: |
          mkdir -p prototype/models
          cp ml/models/fingerspell_mlp.onnx ml/models/labels.json prototype/models/
          cp ml/models/dynamic_signs_transformer.onnx ml/models/dynamic_labels.json prototype/models/

      # --- Regenerate parity samples from the trained pipeline -----------
      - name: Regenerate parity samples
        run: |
          python3 - <<'PY'
          import json, sys, numpy as np; sys.path.insert(0, 'ml')
          from synth_landmarks import _synthesize_one
          from features import normalize
          rng = np.random.default_rng(42)
          samples = {}
          for letter in ['A','B','C','L','Y']:
              lm = _synthesize_one(letter, rng); feats = normalize(lm)
              samples[letter] = {
                  'landmarks': [[round(float(v), 6) for v in pt] for pt in lm],
                  'expected_normalized_first6': [round(float(v), 6) for v in feats[:6]],
                  'expected_normalized_l2': round(float(np.linalg.norm(feats)), 6),
              }
          json.dump(samples, open('prototype/models/parity_samples.json','w'), indent=2)
          PY

      - name: JS↔Python feature parity
        run: |
          mkdir -p ci
          node ci/run_parity.mjs | tee ci/parity.log

      # --- Final gate -----------------------------------------------------
      - name: Enforce release gates
        run: python3 ci/check_nfr.py

      # --- Upload artifacts so reviewers can read the reports -------------
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ml-reports
          path: |
            ml/models/eval_report.md
            ml/models/dynamic_eval_report.md
            ml/models/dynamic_robustness_report.md
            ci/parity.log

  # --------------------------------------------------------------------------
  # Frontend jobs – lint, typecheck, unit tests, Playwright, Lighthouse.
  # Gate: a11y score must be ≥ 95 on /, /setup, and a lesson page.
  # --------------------------------------------------------------------------
  frontend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: signtutor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'signtutor/package-lock.json'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Start server for E2E & Lighthouse
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 120000

      - name: Playwright E2E tests
        run: npx playwright test

      - name: Lighthouse a11y audit
        run: |
          mkdir -p lighthouse
          npx lighthouse http://localhost:3000/ --chrome-flags="--headless=new --no-sandbox" --preset=desktop --output=html --output-path=lighthouse/home.html --only-categories=accessibility
          npx lighthouse http://localhost:3000/setup --chrome-flags="--headless=new --no-sandbox" --preset=desktop --output=html --output-path=lighthouse/setup.html --only-categories=accessibility
          npx lighthouse http://localhost:3000/learn/asl/fingerspelling/A --chrome-flags="--headless=new --no-sandbox" --preset=desktop --output=html --output-path=lighthouse/lesson.html --only-categories=accessibility

      - name: Enforce a11y ≥ 95
        run: |
          for f in lighthouse/home.html lighthouse/setup.html lighthouse/lesson.html; do
            score=$(grep -oP 'lighthouse":\{"lighthouseVersion"[^}]*,"accessibility"[^}]*,"score":[0-9.]*' "$f" | grep -oP 'score":[0-9.]*' | cut -d: -f2)
            echo "$f accessibility score: $score"
            if (( $(echo "$score < 0.95" | bc -l) )); then
              echo "FAIL: a11y score < 95"; exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-reports
          path: |
            signtutor/lighthouse/
            signtutor/playwright-report/
            signtutor/test-results/"
